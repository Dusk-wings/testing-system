name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: 20

      - name: Back-End Dependencie Install
        run: |
          cd backend
          npm install

      - name: Run Back-End Tests
        run: |
          cd backend
          npm test
      
      - name: Front-end Dependencie Install
        run: |
          cd frontend
          npm install

      - name: Run Front-end Tests
        run: |
          cd frontend
          npm test
        env:
          VITE_BACKEND_PATH: http://localhost:3000
        
      - name: Install Playwright
        run: |
          cd frontend
          npx playwright install --with-deps

      - name: Run E2E Tests
        run: |
          cd frontend
          npx playwright test

  
